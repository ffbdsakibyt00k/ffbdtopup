<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFBD TOPUP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#111;
font-family:Arial,sans-serif;
color:white;
}
header{
background:#ff6a00;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}
.banner{
background:#222;
padding:40px;
text-align:center;
}
.banner h2{
font-size:30px;
}
.packages{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}
.card{
background:#1f1f1f;
padding:20px;
border-radius:10px;
text-align:center;
}
.card h3{
color:#ffb000;
}
.price{
font-size:22px;
margin:10px 0;
}
button{
background:#ff6a00;
color:#fff;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}
button:hover{
background:#ff8800;
}
.form{
padding:20px;
text-align:center;
}
input{
width:90%;
max-width:350px;
padding:12px;
margin:10px;
border:none;
border-radius:5px;
}
footer{
background:#000;
text-align:center;
padding:20px;
margin-top:20px;
}
</style>

</head>
<body>

<header>🔥 FFBD TOPUP 🔥</header>

<div class="banner">
<h2>Free Fire Diamond Top-Up</h2>
<p>Fast • Secure • Easy</p>
</div>

<div class="form">
<input type="text" placeholder="Enter Free Fire UID">
</div>

<div class="packages">

<div class="card">
<h3>25 Diamonds</h3>
<div class="price">৳25</div>
<button>Buy Now</button>
</div>

<div class="card">
<h3>50 Diamonds</h3>
<div class="price">৳45</div>
<button>Buy Now</button>
</div>

<div class="card">
<h3>115 Diamonds</h3>
<div class="price">৳90</div>
<button>Buy Now</button>
</div>

<div class="card">
<h3>240 Diamonds</h3>
<div class="price">৳180</div>
<button>Buy Now</button>
</div>

<div class="card">
<h3>355 Diamonds</h3>
<div class="price">৳260</div>
<button>Buy Now</button>
</div>

<div class="card">
<h3>610 Diamonds</h3>
<div class="price">৳440</div>
<button>Buy Now</button>
</div>

</div>

<footer>
© 2026 FFBD TOPUP | Demo Website
</footer>

</body>
</html>
